name: Deployment to production
on:
  push:
    branches: [ main ]

jobs:
  continuous_deployment:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    -name: Deploy via SSH
     uses: apppleboy/ssh-action@v1
     with:
      host: ${{ secrets.EC2_HOST }}
      username: ${{ secrets.EC2_USER }}
      key: ${{ secrets.SSH_KEY }}

      scripts: |
        cd /ubuntu/Mindhive
        git pull
        pnpm install
        pnpm --filter web build
        pnpm --filter http-server build
        pnpm --filter ws-server build
        pm2 restart all
